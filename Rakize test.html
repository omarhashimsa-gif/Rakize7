function renderQuestion(){if(finished){renderResult();return}const q=allQuestions[current];let h='<div class="glass card">';h+='<div class="quiz-meta">';if(quizData.time)h+='<div class="quiz-badge"><i class="fas fa-hourglass-half"></i> <span id="timerValue">'+formatTime(timeLeft)+'</span></div>';h+='<div class="quiz-badge"><i class="fas fa-list-ol"></i> سؤال '+(current+1)+' من '+allQuestions.length+'</div></div>';if(q.sectionName&&(current===0||allQuestions[current-1].sectionName!==q.sectionName))h+='<div class="section-header"><i class="fas fa-folder-open"></i> '+escapeHtml(q.sectionName)+'</div>';if(q.questionHeader)h+='<div style="font-size:0.95rem;font-weight:700;color:var(--gold-soft);margin-bottom:4px;">'+escapeHtml(q.questionHeader)+'</div>';h+='<div style="font-size:1rem;font-weight:600;margin-bottom:10px;">'+escapeHtml(q.questionText)+'</div>';if(q.imageBase64)h+='<img src="'+q.imageBase64+'" class="quiz-image" onclick="openImageOverlay(this.src)" alt="صورة السؤال">';const activeOpts=q.options.filter(o=>o.trim());const letters='أبجدهوزحطيكلمنسعفصقرشتثخذضظغ'.split('');const isMulti=activeOpts.length>4;const sel=answers[current]||[];activeOpts.forEach((o,i)=>{h+='<div class="opt'+(sel.includes(i)?' selected':'')+'" data-opt="'+i+'"><span class="opt-letter">'+letters[i]+'</span>'+escapeHtml(o)+'<i class="fas fa-check-circle" style="color:#4ade80;display:'+(sel.includes(i)?'inline-block':'none')+'"></i></div>';});h+='<div style="display:flex;gap:10px;margin-top:14px;">'+(current>0?'<button class="btn" id="prevBtn">السابق</button>':'')+'<button class="btn" id="nextBtn">'+(current===allQuestions.length-1?'إنهاء الاختبار':'التالي')+'</button></div></div>';quizApp.innerHTML=h;if(quizData.time&&!timerInterval)startTimer();
document.querySelectorAll('.opt').forEach(el=>el.addEventListener('click',function(){const idx=parseInt(this.dataset.opt);let cur=answers[current]||[];if(isMulti){if(cur.includes(idx))cur=cur.filter(c=>c!==idx);else cur.push(idx);}else{cur=[idx];}answers[current]=cur;renderQuestion();}));
if(current>0)document.getElementById('prevBtn')?.addEventListener('click',()=>{current--;renderQuestion()});document.getElementById('nextBtn').addEventListener('click',()=>{if(current===allQuestions.length-1){showConfirmModal();}else{current++;renderQuestion()}});}
function openImageOverlay(src){document.getElementById('overlayImg').src=src;document.getElementById('imageOverlay').classList.add('open');}
function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return m+':'+(s<10?'0':'')+s}
function startTimer(){timerInterval=setInterval(()=>{timeLeft--;if(timeLeft<=0){clearInterval(timerInterval);timeLeft=0;timeoutOverlay.classList.add('open');setTimeout(()=>{timeoutOverlay.classList.remove('open');finished=true;renderResult();},2500);return}const ts=document.getElementById('timerValue');if(ts){ts.textContent=formatTime(timeLeft);if(timeLeft<60)ts.parentElement.style.color='#f87171';}},1000)}
let correctCount=0;let reviewCurrent=0;
function renderResult(){clearInterval(timerInterval);correctCount=0;allQuestions.forEach((q,i)=>{const sel=answers[i]||[];const corr=q.correctAnswers||[];if(sel.length===corr.length&&sel.every(s=>corr.includes(s))&&corr.every(c=>sel.includes(c)))correctCount++;});const unanswered=allQuestions.filter((q,i)=>(answers[i]||[]).length===0).length;const wrong=allQuestions.length-correctCount-unanswered;
function renderReviewQuestion(){const q=allQuestions[reviewCurrent];let rh='<div class="glass card">';rh+='<div class="quiz-meta"><div class="quiz-badge"><i class="fas fa-list-ol"></i> مراجعة: سؤال '+(reviewCurrent+1)+' من '+allQuestions.length+'</div></div>';if(q.sectionName&&(reviewCurrent===0||allQuestions[reviewCurrent-1].sectionName!==q.sectionName))rh+='<div class="section-header"><i class="fas fa-folder-open"></i> '+escapeHtml(q.sectionName)+'</div>';if(q.questionHeader)rh+='<div style="font-size:0.95rem;font-weight:700;color:var(--gold-soft);margin-bottom:4px;">'+escapeHtml(q.questionHeader)+'</div>';rh+='<div style="font-size:1rem;font-weight:600;margin-bottom:10px;">'+escapeHtml(q.questionText)+'</div>';if(q.imageBase64)rh+='<img src="'+q.imageBase64+'" class="quiz-image" style="margin-bottom:10px;" alt="صورة السؤال">';const activeOpts=q.options.filter(o=>o.trim());const letters='أبجدهوزحطيكلمنسعفصقرشتثخذضظغ'.split('');const sel=answers[reviewCurrent]||[];const corr=q.correctAnswers||[];activeOpts.forEach((o,i)=>{let cls='';let icon='';if(sel.includes(i)&&corr.includes(i)){cls='selected';icon='<i class="fas fa-check-circle" style="color:#4ade80;"></i>';}else if(sel.includes(i)&&!corr.includes(i)){cls='selected';icon='<i class="fas fa-times-circle" style="color:#f87171;"></i>';}else if(!sel.includes(i)&&corr.includes(i)){cls='correct-ans';icon='<i class="fas fa-check-circle" style="color:#4ade80;"></i>';}rh+='<div class="opt '+cls+'"><span class="opt-letter">'+letters[i]+'</span>'+escapeHtml(o)+icon+'</div>';});if(q.explanation?.trim())rh+='<div class="explanation-box"><i class="fas fa-lightbulb"></i> '+escapeHtml(q.explanation)+'</div>';rh+='<div style="display:flex;gap:10px;margin-top:14px;">'+(reviewCurrent>0?'<button class="btn" id="prevReviewBtn">السابق</button>':'')+'<button class="btn" id="nextReviewBtn">'+(reviewCurrent===allQuestions.length-1?'عرض النتيجة':'التالي')+'</button></div></div>';document.getElementById('reviewContainer').innerHTML=rh;if(reviewCurrent>0)document.getElementById('prevReviewBtn')?.addEventListener('click',()=>{reviewCurrent--;renderReviewQuestion();});document.getElementById('nextReviewBtn').addEventListener('click',()=>{if(reviewCurrent===allQuestions.length-1){showResultSummary();}else{reviewCurrent++;renderReviewQuestion();}});}
function showResultSummary(){let html='<div class="glass card"><h2 style="color:var(--gold-soft)"><i class="fas fa-trophy"></i> النتيجة - '+escapeHtml(studentName)+'</h2><div style="font-size:42px;font-weight:900;text-align:center;margin:10px 0;">'+correctCount+'/'+allQuestions.length+'</div><div style="font-size:1.1rem;text-align:center;margin-bottom:16px;">'+Math.round((correctCount/allQuestions.length)*100)+'%</div><div class="result-stats"><div class="stat-card"><i class="fas fa-check-circle" style="color:#4ade80;font-size:1.8rem;"></i><div class="stat-number" style="color:#4ade80;">'+correctCount+'</div><div>صحيحة</div></div><div class="stat-card"><i class="fas fa-times-circle" style="color:#f87171;font-size:1.8rem;"></i><div class="stat-number" style="color:#f87171;">'+wrong+'</div><div>خاطئة</div></div><div class="stat-card"><i class="fas fa-minus-circle" style="color:#9ca3af;font-size:1.8rem;"></i><div class="stat-number" style="color:#9ca3af;">'+unanswered+'</div><div>بدون إجابة</div></div></div><button class="btn" id="reviewAllBtn"><i class="fas fa-search"></i> مراجعة الأسئلة</button><button class="btn" onclick="location.reload()" style="margin-top:12px;background:linear-gradient(135deg,#f59e0b,#d97706);"><i class="fas fa-redo"></i> إعادة الاختبار</button></div>';document.getElementById('reviewContainer').innerHTML=html;document.getElementById('reviewAllBtn').addEventListener('click',()=>{reviewCurrent=0;renderReviewQuestion();});}
let mainHtml='<div id="reviewContainer"></div>';quizApp.innerHTML=mainHtml;showResultSummary();}

            }

            function downloadQuiz(quiz) {
                const html = generateFullQuizHTML(quiz);
                if(html) {
                    const b = new Blob([html], { type: 'text/html' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(b);
                    a.download = `اختبار_${quiz.settings.subject || 'مادة'}_ركـز.html`.substring(0,100);
                    a.click();
                    showToast('تم تحميل الاختبار بنجاح', 'fa-check-circle');
                }
            }
            function previewQuiz(quiz) {
                const html = generateFullQuizHTML(quiz);
                if(!html) return;
                dom.previewIframe.srcdoc = html;
                dom.previewOverlay.classList.add('open');
            }

            // ===== EVENT BINDINGS =====
            dom.saveCurrentFromLibrary?.addEventListener('click', saveAndGoToLibrary);
            dom.saveAndGoToLibraryBtn?.addEventListener('click', saveAndGoToLibrary);

            dom.closePreviewBtn.addEventListener('click', () => dom.previewOverlay.classList.remove('open'));
            dom.previewOverlay.addEventListener('click', (e) => {
                if(e.target === dom.previewOverlay) dom.previewOverlay.classList.remove('open');
            });
            dom.closeValidationBtn.addEventListener('click', hideValidationErrors);
            dom.validationOverlay.addEventListener('click', (e) => {
                if(e.target === dom.validationOverlay) hideValidationErrors();
            });

            // ===== TABS =====
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            function switchTab(tid) {
                contents.forEach(c => c.classList.remove('active-tab'));
                document.getElementById(tid).classList.add('active-tab');
                tabs.forEach(t => t.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${tid}"]`).classList.add('active');
                if(tid === 'tab3') { syncCurrentDataToVars(); renderLibrary(); }
                if(tid === 'tab1' || tid === 'tab2') loadCurrentQuizToUI();
            }
            tabs.forEach(b => b.addEventListener('click', () => switchTab(b.getAttribute('data-tab'))));
            document.querySelectorAll('.next-tab').forEach(b => b.addEventListener('click', () => switchTab(b.getAttribute('data-next'))));

            // ===== INIT =====
            loadCurrentSettingsFromStorage();
            loadLibrary();
            loadCurrentQuizToUI();
            updateFloatPreview();

            document.querySelectorAll('#tab1 .glass-input, #tab1 .glass-select').forEach(inp => {
                inp.addEventListener('input', syncCurrentDataToVars);
                inp.addEventListener('change', syncCurrentDataToVars);
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { e.preventDefault(); goToPrevQuestion(); }
                if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { e.preventDefault(); goToNextQuestion(); }
            });

            // Auto-save
            setInterval(() => {
                updateCurrentQuestion();
            }, 1000);

        })();
